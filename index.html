<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahmaniyya Islamic Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1511; color: #f3f4f6; }
    .glass { background: rgba(18, 38, 32, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); }
    .gold-glow { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
  </style>
</head>
<body class="min-h-screen pb-12">

  <div id="login-container" class="flex flex-col items-center justify-center min-h-screen px-4">
    <div class="glass w-full max-w-md rounded-2xl p-8 gold-glow">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-amber-400 tracking-wide">RAHMANIYYA</h1>
        <p class="text-emerald-400 text-sm mt-1">Islamic Spirit Performance Tracker</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Student ID</label>
          <input type="text" id="login-id" class="w-full bg-[#070d0b] border border-emerald-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-400 transition" placeholder="e.g., STU001">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Password</label>
          <input type="password" id="login-pass" class="w-full bg-[#070d0b] border border-emerald-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-400 transition" placeholder="••••••••">
        </div>
        <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-slate-950 font-bold py-3.5 rounded-xl transition mt-2 active:scale-95 shadow-lg">Verify & Sign In</button>
      </div>
    </div>
  </div>

  <div id="app-container" class="hidden max-w-4xl mx-auto px-4 pt-6 space-y-6">
    
    <div class="glass rounded-2xl p-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h2 class="text-xl font-bold text-amber-400">Assalamu Alaikum, <span id="user-name">Student</span>!</h2>
        <p class="text-xs text-emerald-400 tracking-wide mt-0.5">Keep up your consistent spiritual growth today.</p>
      </div>
      <button onclick="logout()" class="text-xs text-red-400 border border-red-900/40 bg-red-950/20 px-3 py-1.5 rounded-lg hover:bg-red-900/30 transition">Log Out</button>
    </div>

    <div class="grid grid-cols-3 gap-3">
      <div class="glass rounded-xl p-4 text-center">
        <p class="text-2xl font-black text-amber-400" id="stat-streak">0</p>
        <p class="text-[10px] uppercase tracking-wider text-gray-400 mt-1">🔥 Day Streak</p>
      </div>
      <div class="glass rounded-xl p-4 text-center">
        <p class="text-2xl font-black text-emerald-400" id="stat-namaz">0%</p>
        <p class="text-[10px] uppercase tracking-wider text-gray-400 mt-1">🕌 Namaz Comp.</p>
      </div>
      <div class="glass rounded-xl p-4 text-center">
        <p class="text-2xl font-black text-cyan-400" id="stat-quran">0</p>
        <p class="text-[10px] uppercase tracking-wider text-gray-400 mt-1">📖 Quran Pages</p>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      
      <div class="glass rounded-2xl p-6 space-y-5">
        <h3 class="text-md font-semibold text-amber-400 border-b border-emerald-900/50 pb-2">Daily Entry Logging</h3>
        
        <div class="space-y-2.5">
          <label class="block text-xs font-bold text-emerald-400 uppercase tracking-widest mb-1">Mark Today's Prayers</label>
          <div class="grid grid-cols-1 gap-2">
            <label class="flex items-center justify-between bg-[#070d0b] px-4 py-3 rounded-xl border border-emerald-900/30 cursor-pointer select-none">
              <span class="text-sm">Subh (Fajr)</span>
              <input type="checkbox" id="check-subh" class="w-5 h-5 accent-amber-500 rounded">
            </label>
            <label class="flex items-center justify-between bg-[#070d0b] px-4 py-3 rounded-xl border border-emerald-900/30 cursor-pointer select-none">
              <span class="text-sm">Zuhr</span>
              <input type="checkbox" id="check-zuhr" class="w-5 h-5 accent-amber-500 rounded">
            </label>
            <label class="flex items-center justify-between bg-[#070d0b] px-4 py-3 rounded-xl border border-emerald-900/30 cursor-pointer select-none">
              <span class="text-sm">Asar</span>
              <input type="checkbox" id="check-asar" class="w-5 h-5 accent-amber-500 rounded">
            </label>
            <label class="flex items-center justify-between bg-[#070d0b] px-4 py-3 rounded-xl border border-emerald-900/30 cursor-pointer select-none">
              <span class="text-sm">Maghrib</span>
              <input type="checkbox" id="check-maghrib" class="w-5 h-5 accent-amber-500 rounded">
            </label>
            <label class="flex items-center justify-between bg-[#070d0b] px-4 py-3 rounded-xl border border-emerald-900/30 cursor-pointer select-none">
              <span class="text-sm">Isha</span>
              <input type="checkbox" id="check-isha" class="w-5 h-5 accent-amber-500 rounded">
            </label>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-bold text-emerald-400 uppercase tracking-widest">Quran Recitation</label>
          <input type="number" id="input-quran" min="0" class="w-full bg-[#070d0b] border border-emerald-900/50 rounded-xl px-4 py-3 focus:outline-none focus:border-amber-400 text-white" placeholder="Pages read in this sitting...">
        </div>

        <button onclick="submitDailyPerformance()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-xl transition shadow-lg active:scale-95">Save & Log Metrics</button>
      </div>

      <div class="glass rounded-2xl p-6 flex flex-col justify-between">
        <div>
          <h3 class="text-md font-semibold text-amber-400 border-b border-emerald-900/50 pb-2 mb-4">Monthly Performance Map</h3>
          <div class="relative w-full h-64 flex items-center justify-center">
            <canvas id="performanceChart"></canvas>
          </div>
        </div>
        <p class="text-[11px] text-gray-500 text-center mt-4">Calculations run dynamically relative to your assigned target metrics.</p>
      </div>

    </div>
  </div>

  <script>
    // Paste your Google Apps Script Web App Endpoint URL below
    const API_URL = "https://script.google.com/macros/s/AKfycbw2han8-Qw-tQj3iCIo6-WNsSBPHb9qgpZUC8TfrtdzzGVWuT8sXZ3J30BXqmQCpiYz/exec";
    
    let currentStudentId = "";
    let myChart = null;

    function handleLogin() {
      const student_id = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-pass').value.trim();

      if(!student_id || !password) return alert("Please fill out all login parameters.");

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "login", student_id, password })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          currentStudentId = student_id;
          document.getElementById('user-name').innerText = data.name;
          document.getElementById('login-container').classList.add('hidden');
          document.getElementById('app-container').classList.remove('hidden');
          fetchDashboardMetrics();
        } else {
          alert(data.message);
        }
      }).catch(err => alert("Connection failure. Check your script endpoint configurations."));
    }

    function submitDailyPerformance() {
      const subh = document.getElementById('check-subh').checked;
      const zuhr = document.getElementById('check-zuhr').checked;
      const asar = document.getElementById('check-asar').checked;
      const maghrib = document.getElementById('check-maghrib').checked;
      const isha = document.getElementById('check-isha').checked;
      const quran_pages = document.getElementById('input-quran').value || 0;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "submitDaily",
          student_id: currentStudentId,
          subh, zuhr, asar, maghrib, isha, quran_pages
        })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          alert("Progress cataloged beautifully!");
          document.getElementById('input-quran').value = '';
          fetchDashboardMetrics();
        }
      });
    }

    function fetchDashboardMetrics() {
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getDashboardData", student_id: currentStudentId })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          document.getElementById('stat-streak').innerText = data.streak;
          document.getElementById('stat-namaz').innerText = data.completionRate + "%";
          document.getElementById('stat-quran').innerText = data.quranPages;
          renderChart(data.completionRate, 100 - data.completionRate);
        }
      });
    }

    function renderChart(completed, remaining) {
      const ctx = document.getElementById('performanceChart').getContext('2d');
      if(myChart) myChart.destroy();
      
      myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Completed Prayers', 'Remaining Base Target'],
          datasets: [{
            data: [completed, remaining === 100 ? 100 : Math.max(0, remaining)],
            backgroundColor: ['#10b981', '#1e293b'],
            borderColor: ['#f59e0b', 'transparent'],
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } }
        }
      });
    }

    function logout() {
      location.reload();
    }
  </script>
</body>
</html>
